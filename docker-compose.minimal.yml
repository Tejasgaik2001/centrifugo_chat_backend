services:
  mongodb:
    image: mongo:7
    container_name: messaging-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: messaging

  redis:
    image: redis:7-alpine
    container_name: messaging-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: messaging-centrifugo
    ports:
      - '8000:8000'
    volumes:
      - ./centrifugo.json:/centrifugo/config.json
    command: centrifugo --config=/centrifugo/config.json
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
