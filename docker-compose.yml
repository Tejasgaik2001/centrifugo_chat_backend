version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: messaging-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: messaging

  redis:
    image: redis:7-alpine
    container_name: messaging-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: messaging-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: messaging-zookeeper
    ports:
      - '2181:2181'
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes

  kafka:
    image: bitnami/kafka:3
    container_name: messaging-kafka
    ports:
      - '9092:9092'
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
    depends_on:
      - zookeeper

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: messaging-centrifugo
    ports:
      - '8000:8000'
    volumes:
      - ./centrifugo.json:/centrifugo/config.json
    command: centrifugo --config=/centrifugo/config.json
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
  elasticsearch_data:
